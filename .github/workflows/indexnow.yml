name: IndexNow

on:
  workflow_run:
    workflows:
      - deploy
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  indexnow:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Wait for deployed sitemap propagation
        run: sleep 30

      - name: Get URLs from sitemap
        run: |
          curl --fail --silent --show-error --location https://yp7.net/sitemap.xml \
            | grep -oP '(?<=<loc>)[^<]+' > urls.txt
          test -s urls.txt

      - name: Submit to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          case "$INDEXNOW_KEY" in
            ''|*[!A-Za-z0-9_-]*)
              echo "INDEXNOW_KEY secret is missing or contains unsupported characters."
              exit 1
              ;;
          esac
          urls=$(jq -R . < urls.txt | jq -s .)
          jq -n \
            --arg host "yp7.net" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyLocation "https://yp7.net/${INDEXNOW_KEY}.txt" \
            --argjson urlList "$urls" \
            '{ host: $host, key: $key, keyLocation: $keyLocation, urlList: $urlList }' \
            | curl --fail --silent --show-error --location -X POST "https://api.indexnow.org/indexnow" \
              -H "Content-Type: application/json" \
              --data-binary @-
