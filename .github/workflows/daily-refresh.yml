name: Daily Refresh

on:
  schedule:
    # 07:00 Asia/Shanghai
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Update reviewed date
        run: pnpm run docs:update-reviewed-date
        env:
          TZ: Asia/Shanghai

      - name: Build VuePress site
        run: pnpm run docs:build

      - name: Sync generated data
        run: pnpm run docs:sync-data

      - name: Check generated data
        run: pnpm run docs:check-data

      - name: Check content health
        run: pnpm run docs:check-content

      - name: Commit refreshed data
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/.vuepress/config/site.ts docs/.vuepress/public/data docs/.vuepress/public/llms.txt docs/index.md
          git commit -m "chore: daily site refresh"
          git push
